name: release

# On a version tag (e.g. v0.1.0): verify, then build the standalone CLI
# binaries for every platform and the VS Code .vsix, and attach them all to a
# GitHub release. No package registries, no marketplace, no account or token —
# users install the binary via install.sh / `docref self-update`, and the
# extension by downloading the .vsix.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test
      - run: bun run build
      - run: node packages/cli/dist/docref.js check

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # Bun cross-compiles every target from this one Linux runner.
      - name: Build the standalone binaries
        run: |
          mkdir -p out
          for t in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            bun build --compile --target="bun-$t" packages/cli/src/standalone.ts --outfile "out/docref-$t"
          done
          bun build --compile --target=bun-windows-x64 packages/cli/src/standalone.ts --outfile out/docref-windows-x64.exe

      - name: Build the VS Code .vsix
        working-directory: packages/vscode
        run: npx --yes @vscode/vsce@latest package --no-dependencies -o ../../out/

      - name: Create the GitHub release and attach the binaries + .vsix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" out/* \
            --title "$GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" out/* --clobber
