name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # full history so `docref affected` can diff against the PR base
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Test (the contract suite)
        # `bun run test` dispatches to the vitest script (package.json), the
        # runner contributors use. `bun test` is Bun's own runner: it ignores
        # vitest.config.ts and shares module state across files, so the suites
        # disagree. Keep CI on the same engine as the dev loop.
        run: bun run test

      - name: Build CLI and extension
        run: bun run build

      # Fast is a feature: a large project (~4800 references) must check and
      # refresh under one second on the shipped binary. The algorithmic guard
      # (parse once per file, not per reference) is in the contract suite.
      - name: Performance gate (binary, under 1s)
        run: |
          bun run build:bin
          bun run bench

      # Dogfood: the tool gates its own repository. A broken or stale
      # reference in the docs fails the build, exactly as it would for a
      # consumer.
      - name: docref self-check
        run: node packages/cli/dist/docref.js check

      # Informational: on a PR, list the docs endangered by the change.
      # `affected` always exits 0, so this never blocks; it is a heads-up,
      # while the self-check above is the gate.
      - name: docref affected (informational)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node packages/cli/dist/docref.js affected --since "$BASE_SHA"

  # Full dogfood: gate this repo with the PUBLISHED container, exactly as a
  # consumer would. The build job above checks the current source; this checks
  # the shipped artifact. Run via `docker run`, not a `container:` job: the
  # image is tiny Alpine/musl with no Node, so a JS action like checkout cannot
  # run inside it — check out on the host, then mount the repo into the image,
  # the invocation docker/Dockerfile documents. safe.directory because the
  # checkout is owned by the runner user while the container runs as root.
  container-dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docref check via the published container
        run: |
          docker run --rm --pull=always -v "$PWD:/repo" \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0='*' \
            ghcr.io/manchtools/open-docref:latest check
